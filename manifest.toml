#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "beszel"
name = "Beszel"
description.en = "Lightweight server monitoring"
description.fr = "Monitoring de serveurs"

version = "0.18.7~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "MIT"
website = "https://www.beszel.dev/"
admindoc = "https://beszel.dev/guide/hub-installation#binary"
code = "https://github.com/henrygd/beszel"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = [ "amd64", "arm64", "armhf" ]
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/henrygd/beszel/releases/download/v0.18.7/beszel_linux_amd64.tar.gz"
    amd64.sha256 = "b75c52a82af5c9721f08a7a9cb0c16df27e81967a3855cef7c77dbad9fb43524"
    arm64.url = "https://github.com/henrygd/beszel/releases/download/v0.18.7/beszel_linux_arm64.tar.gz"
    arm64.sha256 = "e25698cfe10c9248bb8e48878dcb345c2fe77c5f63f1477c67d51395c45c64ff"
    armhf.url = "https://github.com/henrygd/beszel/releases/download/v0.18.7/beszel_linux_arm.tar.gz"
    armhf.sha256 = "8007d53bb84ae993a4d5eb14d537c18417f10d38787f5d799f4291c8b5ef8be2"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "beszel_linux_amd64.tar.gz"
    autoupdate.asset.arm64 = "beszel_linux_arm64.tar.gz"
    autoupdate.asset.armhf = "beszel_linux_arm.tar.gz"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

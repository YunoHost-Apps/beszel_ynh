#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "beszel"
name = "Beszel"
description.en = "Lightweight server monitoring"
description.fr = "Monitoring de serveurs"

version = "0.18.6~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "MIT"
website = "https://www.beszel.dev/"
admindoc = "https://beszel.dev/guide/hub-installation#binary"
code = "https://github.com/henrygd/beszel"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = [ "amd64", "arm64", "armhf" ]
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/henrygd/beszel/releases/download/v0.18.6/beszel_linux_amd64.tar.gz"
    amd64.sha256 = "93f3f57377e6f61a8262259c2eee4ab5dad4b062a1f4c45853684477d2ec66ed"
    arm64.url = "https://github.com/henrygd/beszel/releases/download/v0.18.6/beszel_linux_arm64.tar.gz"
    arm64.sha256 = "3dc4887d24afc9a210032b0b6ff46407d67e9b5f3334bb19f72989a780f7f0f0"
    armhf.url = "https://github.com/henrygd/beszel/releases/download/v0.18.6/beszel_linux_arm.tar.gz"
    armhf.sha256 = "e88b1553333dc1bf58deb993bd7bac1a66ce64a0ff47a9cb2af386f619503006"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "beszel_linux_amd64.tar.gz"
    autoupdate.asset.arm64 = "beszel_linux_arm64.tar.gz"
    autoupdate.asset.armhf = "beszel_linux_arm.tar.gz"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
